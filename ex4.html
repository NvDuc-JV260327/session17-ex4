<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: 600px;
            height: 300px;
            border: 1px solid black;
            margin-left: 20px;
        }
        .above {
            display:flex;
            width: 100%;
            height: 50%;
            padding-left: 20px;
            margin: 0;
            flex-direction: column;
            justify-content: space-between;
        }
        .above p {
            font-size: 50px;
        }
        .above span {
            margin-bottom: 30px;
            font-size: 30px;
        }
        .below {
            width: 100%;
            height: 50%;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .below div {
            height: 80%;
            flex: 1;
            margin-left: 10px;
            border: 3px solid black;
        }
        .yellow {
            background-color: yellow;
        }
        .green {
            background-color: green;
        }
        .gray {
            background-color: gray;
            margin-right: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="above">
            <p><b>Change backgroundColor</b></p>
            <span>Mouse over the square</span>
        </div>
        <div class="below">
            <div class="yellow"></div>
            <div class="green"></div>
            <div class="gray"></div>
        </div>
    </div>

    <script src="./ex4.js"></script>
</body>
</html>
